<!DOCTYPE html>
<html>
<head>
<title>Messenger Dashboard</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */
#sidebar{
width:280px;
background:#020617;
display:flex;
flex-direction:column;
padding:15px;
border-right:1px solid #1e293b;
}

#logo{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

/* GLOBAL BUTTON */
.global{
padding:10px;
border-radius:8px;
cursor:pointer;
margin-bottom:10px;
background:#1e293b;
}

.global:hover{
background:#334155;
}

/* USER LIST */
#users{
flex:1;
overflow-y:auto;
}

.user{
display:flex;
align-items:center;
padding:8px;
border-radius:8px;
cursor:pointer;
}

.user:hover{
background:#1e293b;
}

.avatar{
width:30px;
height:30px;
border-radius:50%;
background:#6366f1;
display:flex;
align-items:center;
justify-content:center;
margin-right:10px;
font-size:12px;
}

.online-dot{
width:8px;
height:8px;
background:#22c55e;
border-radius:50%;
margin-left:auto;
}

/* BOTTOM PROFILE */
#profile{
border-top:1px solid #1e293b;
padding-top:10px;
margin-top:10px;
}

#profile-name{
font-weight:600;
}

.profile-btn{
margin-top:5px;
font-size:13px;
color:#aaa;
cursor:pointer;
}

.profile-btn:hover{
color:white;
}

/* CHAT AREA */
#chat{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */
#header{
padding:15px;
border-bottom:1px solid #1e293b;
font-weight:600;
display:flex;
justify-content:space-between;
}

#stats{
font-size:12px;
color:#aaa;
}

/* CHAT BOX */
#messages{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
}

/* MESSAGE */
.msg{
max-width:60%;
padding:10px;
margin:5px 0;
border-radius:12px;
background:#1e293b;
}

.me{
margin-left:auto;
background:#6366f1;
}

.meta{
font-size:10px;
opacity:0.6;
margin-top:4px;
}

/* SYSTEM MESSAGE */
.system{
text-align:center;
font-size:12px;
opacity:0.6;
margin:10px 0;
}

/* INPUT */
#inputArea{
display:flex;
padding:10px;
background:#020617;
}

#msg{
flex:1;
padding:10px;
border-radius:20px;
border:none;
background:#1e293b;
color:white;
}

.send{
margin-left:10px;
padding:10px 15px;
border:none;
border-radius:20px;
background:#6366f1;
cursor:pointer;
}

/* SCROLLBAR */
::-webkit-scrollbar{
width:6px;
}
::-webkit-scrollbar-thumb{
background:#334155;
border-radius:10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">

<div id="logo">Messenger</div>

<div class="global" onclick="openGlobal()">🌍 Global Chat</div>

<div id="users"></div>

<div id="profile">
<div id="profile-name"></div>
<div class="profile-btn" onclick="showProfile()">Profile</div>
<div class="profile-btn" onclick="logout()">Logout</div>
</div>

</div>

<!-- CHAT -->
<div id="chat">

<div id="header">
<span id="chatTitle">Global Chat</span>
<span id="stats"></span>
</div>

<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="Type message...">
<button class="send" onclick="send()">Send</button>
</div>

</div>

<script>
const socket = io();
let username="";
let userCount=0;

/* ESCAPE */
function escapeHTML(t){
return t.replace(/[&<>"']/g,m=>({
"&":"&amp;","<":"&lt;",">":"&gt;",
'"':"&quot;","'":"&#39;"
}[m]));
}

/* SET USER */
function setUser(name){
username=name;
document.getElementById("profile-name").innerText=name;
}

/* SEND */
function send(){
let text=document.getElementById("msg").value.trim();
if(!text) return;

socket.emit("message",{msg:text});
document.getElementById("msg").value="";
}

/* ENTER */
document.getElementById("msg").addEventListener("keypress",e=>{
if(e.key==="Enter") send();
});

/* MESSAGE */
socket.on("message",m=>{
addMessage(m);
});

/* HISTORY */
socket.on("history",arr=>{
document.getElementById("messages").innerHTML="";
arr.forEach(addMessage);
});

/* ADD MESSAGE */
function addMessage(m){
let d=document.createElement("div");
d.className="msg";

if(m.user===username) d.classList.add("me");

d.innerHTML=`
<b>${escapeHTML(m.user)}</b><br>
${escapeHTML(m.msg)}
<div class="meta">${m.time}</div>
`;

let box=document.getElementById("messages");
box.appendChild(d);
box.scrollTop=box.scrollHeight;
}

/* USERS */
socket.on("users",list=>{
let box=document.getElementById("users");
box.innerHTML="";

userCount=list.length;
document.getElementById("stats").innerText=userCount+" online";

list.forEach(u=>{
let d=document.createElement("div");
d.className="user";

d.innerHTML=`
<div class="avatar">${u[0].toUpperCase()}</div>
<span>${u}</span>
<div class="online-dot"></div>
`;

box.appendChild(d);
});
});

/* GLOBAL */
function openGlobal(){
document.getElementById("chatTitle").innerText="Global Chat";
}

/* PROFILE */
function showProfile(){
alert("User: "+username+"\nOnline users: "+userCount);
}

/* LOGOUT */
function logout(){
location.reload();
}
</script>

</body>
</html>
