<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GAMA Messenger</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Segoe UI,Arial;
}

/* BODY */

body{
display:flex;
height:100vh;
color:white;
overflow:hidden;
background:radial-gradient(circle at top,#1e1b4b,#020617 70%);
}

/* BACKGROUND GLOW ORBS */

.orb{
position:absolute;
border-radius:50%;
filter:blur(80px);
opacity:.5;
}

.orb1{
width:300px;height:300px;
background:#6366f1;
top:10%;left:15%;
animation:move 10s infinite alternate;
}

.orb2{
width:250px;height:250px;
background:#9333ea;
bottom:10%;right:15%;
animation:move 12s infinite alternate;
}

@keyframes move{
from{transform:translateY(0)}
to{transform:translateY(40px)}
}

/* LEFT PANEL */

.left-panel{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:2;
}

.logo{
font-size:70px;
font-weight:bold;
letter-spacing:6px;
background:linear-gradient(90deg,#6366f1,#a78bfa,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 20px #6366f1;}
to{text-shadow:0 0 40px #a78bfa;}
}

.tagline{
margin-top:10px;
opacity:.7;
}

/* RIGHT PANEL */

.right-panel{
width:420px;
display:flex;
justify-content:center;
align-items:center;
z-index:2;
}

/* CARD WITH GLOW BORDER */

.auth-card{
width:340px;
padding:40px;
border-radius:20px;
position:relative;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
box-shadow:0 20px 60px rgba(0,0,0,.7);
}

/* animated border */

.auth-card::before{
content:"";
position:absolute;
inset:-2px;
border-radius:22px;
background:linear-gradient(270deg,#6366f1,#9333ea,#22c55e);
background-size:400% 400%;
animation:borderMove 6s linear infinite;
z-index:-1;
}

@keyframes borderMove{
0%{background-position:0%}
100%{background-position:400%}
}

.auth-card h2{
text-align:center;
margin-bottom:30px;
}

/* FLOATING INPUT */

.input-group{
position:relative;
margin-bottom:22px;
}

.input-group input{
width:100%;
padding:14px;
background:transparent;
border:1px solid rgba(255,255,255,.2);
border-radius:8px;
color:white;
font-size:14px;
}

.input-group label{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
font-size:13px;
opacity:.6;
transition:.3s;
pointer-events:none;
}

.input-group input:focus + label,
.input-group input:valid + label{
top:-8px;
font-size:10px;
background:#020617;
padding:2px 6px;
border-radius:4px;
}

.input-group input:focus{
outline:none;
border-color:#6366f1;
box-shadow:0 0 12px #6366f1;
}

/* PASSWORD TOGGLE */

.toggle{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

/* BUTTONS */

.btn-group{
display:flex;
gap:12px;
margin-top:25px;
}

button{
flex:1;
padding:13px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
font-weight:500;
position:relative;
overflow:hidden;
}

/* BUTTON STYLES */

.login-btn{
background:linear-gradient(135deg,#6366f1,#8b5cf6);
}

.register-btn{
background:linear-gradient(135deg,#22c55e,#4ade80);
}

button:hover{
transform:scale(1.05);
}

/* PULSE EFFECT */

button::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(255,255,255,.2);
opacity:0;
transition:.3s;
}

button:active::after{
opacity:1;
}

/* ERROR */

.error{
color:#ef4444;
margin-top:15px;
text-align:center;
}

/* FOOTER */

.footer{
margin-top:20px;
text-align:center;
opacity:.6;
font-size:12px;
}

</style>
</head>

<body>

<!-- ORBS -->
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- LEFT -->

<div class="left-panel">
<div class="logo">GAMA</div>
<div class="tagline">Secure • Real-time • Private</div>
</div>

<!-- RIGHT -->

<div class="right-panel">

<div class="auth-card">

<h2>Welcome</h2>

<form method="POST">

<div class="input-group">
<input type="text" name="username" required>
<label>Username</label>
</div>

<div class="input-group">
<input id="password" type="password" name="password" required>
<label>Password</label>
<span class="toggle" onclick="togglePassword()">👁</span>
</div>

<div class="btn-group">
<button type="submit" name="action" value="login" class="login-btn">Login</button>
<button type="submit" name="action" value="register" class="register-btn">Register</button>
</div>

</form>

{% if error %}
<div class="error">{{error}}</div>
{% endif %}

<div class="footer">End-to-end secure messaging</div>

</div>

</div>

<script>

function togglePassword(){
let p=document.getElementById("password");
p.type=p.type==="password"?"text":"password";
}

</script>

</body>
</html>
