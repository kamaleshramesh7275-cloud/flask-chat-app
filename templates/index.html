```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Messenger Login</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Segoe UI,Arial;
}

/* BODY */

body{
display:flex;
height:100vh;
color:white;
overflow:hidden;
background:linear-gradient(270deg,#6366f1,#9333ea,#3b82f6);
background-size:600% 600%;
animation:bgmove 15s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* LEFT PANEL */

.left-panel{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
}

.left-panel h1{
font-size:56px;
letter-spacing:3px;
margin-bottom:10px;
animation:fadeup 1s ease;
}

.left-panel p{
font-size:18px;
opacity:.9;
animation:fadeup 1.4s ease;
}

/* floating particles */

.particle{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
opacity:.4;
animation:float 10s infinite linear;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-900px)}
}

@keyframes fadeup{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

/* RIGHT PANEL */

.right-panel{
width:420px;
display:flex;
justify-content:center;
align-items:center;
backdrop-filter:blur(10px);
}

/* LOGIN CARD */

.auth-card{

width:330px;

padding:40px;

border-radius:14px;

background:rgba(0,0,0,0.45);

backdrop-filter:blur(12px);

box-shadow:0 20px 40px rgba(0,0,0,.5);

animation:fadeup 1s ease;

}

.auth-card h2{
margin-bottom:25px;
font-weight:500;
}

/* INPUT */

.input-group{
margin-bottom:18px;
position:relative;
}

input{
width:100%;
padding:12px;
border-radius:6px;
border:none;
background:#1f2937;
color:white;
font-size:14px;
transition:.3s;
}

input:focus{
outline:none;
box-shadow:0 0 8px #6366f1;
transform:scale(1.02);
}

/* PASSWORD TOGGLE */

.toggle{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
opacity:.8;
}

/* BUTTONS */

.btn-group{
display:flex;
gap:10px;
margin-top:20px;
}

button{

flex:1;

padding:12px;

border:none;

border-radius:6px;

font-size:14px;

cursor:pointer;

color:white;

position:relative;

overflow:hidden;

transition:.3s;

}

.login-btn{
background:#6366f1;
}

.register-btn{
background:#22c55e;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,.4);
}

/* ripple effect */

button::after{
content:"";
position:absolute;
width:0;
height:0;
background:rgba(255,255,255,.3);
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
transition:.5s;
}

button:active::after{
width:200px;
height:200px;
}

/* ERROR */

.error{
color:#ef4444;
margin-top:15px;
font-size:14px;
}

/* FOOTER */

.footer{
margin-top:20px;
font-size:12px;
opacity:.7;
text-align:center;
}

</style>
</head>

<body>

<!-- LEFT SIDE -->

<div class="left-panel">

<h1>Messenger</h1>
<p>Real-time encrypted communication</p>

<!-- particles -->

<script>
for(let i=0;i<40;i++){

let p=document.createElement("div");
p.className="particle";

p.style.left=Math.random()*100+"%";
p.style.bottom="-20px";
p.style.animationDuration=(6+Math.random()*8)+"s";

document.body.appendChild(p);

}
</script>

</div>

<!-- RIGHT SIDE -->

<div class="right-panel">

<div class="auth-card">

<h2>Login / Register</h2>

<form method="POST">

<div class="input-group">
<input type="text" name="username" placeholder="Username" required>
</div>

<div class="input-group">

<input id="password" type="password" name="password" placeholder="Password" required>

<span class="toggle" onclick="togglePassword()">👁</span>

</div>

<div class="btn-group">

<button type="submit" name="action" value="login" class="login-btn">
Login
</button>

<button type="submit" name="action" value="register" class="register-btn">
Register
</button>

</div>

</form>

{% if error %}
<div class="error">{{error}}</div>
{% endif %}

<div class="footer">
Secure messaging platform
</div>

</div>

</div>

<script>

function togglePassword(){

let p=document.getElementById("password");

p.type=p.type==="password"?"text":"password";

}

</script>

</body>
</html>
```
